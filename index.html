<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>AR Microscope</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#070b10;color:white;font-family:Arial,sans-serif}
#cameraPreview{position:fixed;inset:0;z-index:1;width:100%;height:100%;object-fit:cover;background:#111;display:none}
a-scene{position:fixed!important;inset:0!important;width:100%!important;height:100%!important;z-index:5!important;background:transparent!important;pointer-events:none}
canvas{background:transparent!important}
#startPanel{position:fixed;z-index:9999;left:50%;top:50%;transform:translate(-50%,-50%);width:min(90vw,560px);padding:24px;border-radius:22px;background:rgba(19,25,36,.95);text-align:center;box-shadow:0 18px 70px rgba(0,0,0,.55)}
button{border:0;border-radius:14px;padding:13px 17px;font-size:16px;font-weight:700;background:white;color:#111;margin:5px}
#toolbar{display:none;position:fixed;z-index:9999;left:8px;right:8px;top:calc(env(safe-area-inset-top) + 12px);text-align:center}
#status{position:fixed;z-index:9999;left:12px;right:12px;bottom:12px;padding:12px;border-radius:16px;background:rgba(0,0,0,.72);color:white;font-size:14px;line-height:1.35;white-space:pre-wrap}
.mindar-ui-loading,.mindar-ui-scanning,.mindar-ui-compatibility,.mindar-ui-error{z-index:9998!important}
</style>
</head>
<body>
<video id="cameraPreview" playsinline autoplay muted></video>

<div id="startPanel">
<h1>AR Microscope</h1>
<p>Uruchom AR i skieruj telefon na zdjęcie mikroskopu.</p>
<button id="startButton">Uruchom AR</button>
</div>

<div id="toolbar">
<button id="rotateButton">360°</button>
<button id="explodeButton">Eksploduj</button>
<button id="resetButton">Reset</button>
</div>
<div id="status">Gotowe.</div>

<a-scene id="scene"
mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes; uiLoading: no; filterMinCF: 0.0001; filterBeta: 0.001"
color-space="sRGB"
renderer="colorManagement: true; antialias: true; alpha: true"
background="transparent: true"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false"
embedded>
<a-assets timeout="30000">
<a-asset-item id="microscopeModel" src="./microscope.glb"></a-asset-item>
</a-assets>
<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
<a-entity id="target" mindar-image-target="targetIndex: 0">
<a-entity id="rotator" rotation="0 0 0">
<a-gltf-model id="microscope" src="#microscopeModel" position="0 -0.12 0" rotation="90 0 0" scale="0.42 0.42 0.42"></a-gltf-model>
</a-entity>
</a-entity>
</a-scene>

<script>
const sceneEl=document.getElementById("scene");
const startPanel=document.getElementById("startPanel");
const startButton=document.getElementById("startButton");
const toolbar=document.getElementById("toolbar");
const statusBox=document.getElementById("status");
const target=document.getElementById("target");
const rotator=document.getElementById("rotator");
const microscope=document.getElementById("microscope");
const cameraPreview=document.getElementById("cameraPreview");

const BASE_ROTATION = {x:90, y:0, z:0};
const BASE_SCALE = 0.42;
let rotationEnabled=false,currentScale=BASE_SCALE,previewStream=null,rotatorAngle=0;

function setStatus(t){statusBox.textContent=t;console.log(t);}

async function startPreviewCamera(){
 const stream=await navigator.mediaDevices.getUserMedia({
  video:{facingMode:{ideal:"environment"},width:{ideal:1280},height:{ideal:720}},
  audio:false
 });
 previewStream=stream;
 cameraPreview.srcObject=stream;
 cameraPreview.style.display="block";
 await cameraPreview.play();
}

startButton.addEventListener("click",async()=>{
 startPanel.style.display="none";
 toolbar.style.display="none";
 try{
  setStatus("Uruchamiam kamerę...");
  await startPreviewCamera();

  setStatus("Kamera działa. Uruchamiam rozpoznawanie mikroskopu...");
  const arSystem=sceneEl.systems["mindar-image-system"];

  setTimeout(async()=>{
   try{
    await arSystem.start();
    setStatus("Skieruj telefon na zdjęcie mikroskopu.");
   }catch(e){
    setStatus("Błąd AR:\n"+(e.name||"")+"\n"+(e.message||e));
    console.error(e);
   }
  },500);

 }catch(e){
  startPanel.style.display="block";
  setStatus("Błąd kamery:\n"+(e.name||"")+"\n"+(e.message||e));
 }
});

target.addEventListener("targetFound",()=>{
 toolbar.style.display="block";
 setStatus("Wykryto mikroskop. Model 3D jest aktywny.");
});

target.addEventListener("targetLost",()=>{
 setStatus("Utracono śledzenie. Skieruj telefon ponownie na zdjęcie mikroskopu.");
});

document.getElementById("rotateButton").onclick=()=>{
 rotationEnabled=!rotationEnabled;
 setStatus(rotationEnabled?"Obrót 360° włączony.":"Obrót 360° wyłączony.");
};

document.getElementById("explodeButton").onclick=()=>{
 currentScale*=1.25;
 microscope.setAttribute("scale",`${currentScale} ${currentScale} ${currentScale}`);
 setStatus("Widok eksplodowany: demonstracyjne powiększenie. Prawdziwy widok eksplodowany wymaga osobnego modelu 3D.");
};

document.getElementById("resetButton").onclick=()=>{
 rotationEnabled=false;
 currentScale=BASE_SCALE;
 microscope.setAttribute("rotation",BASE_ROTATION);
 microscope.setAttribute("scale",`${BASE_SCALE} ${BASE_SCALE} ${BASE_SCALE}`);
 microscope.setAttribute("position","0 -0.12 0");
 rotatorAngle=0;
 rotator.setAttribute("rotation",{x:0,y:0,z:0});
 setStatus("Reset modelu.");
};

function animate(){
 requestAnimationFrame(animate);
 if(rotationEnabled){
  rotatorAngle=(rotatorAngle+1.2)%360;
  // Obrót wokół osi Z targetu działa jak obrotnica na zdjęciu/kartce.
  // Model nie przewraca się góra-dół, tylko obraca się tak, aby pokazać boki i tył.
  rotator.setAttribute("rotation",{x:0,y:0,z:rotatorAngle});
 }
}
animate();

window.addEventListener("error",e=>setStatus("Błąd JS:\n"+e.message));
window.addEventListener("unhandledrejection",e=>setStatus("Błąd Promise:\n"+e.reason));
</script>
</body>
</html>
