<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>AR Microscope Debug</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#070b10; color:white; font-family:Arial,sans-serif; }
    #startPanel { position:fixed; z-index:9999; left:50%; top:50%; transform:translate(-50%,-50%); width:min(90vw,560px); padding:24px; border-radius:22px; background:rgba(19,25,36,.95); text-align:center; box-shadow:0 18px 70px rgba(0,0,0,.55); }
    button { border:0; border-radius:14px; padding:13px 17px; font-size:16px; font-weight:700; background:white; color:#111; margin:5px; }
    #toolbar { display:none; position:fixed; z-index:9999; left:8px; right:8px; top:calc(env(safe-area-inset-top) + 12px); text-align:center; }
    #status { position:fixed; z-index:9999; left:12px; right:12px; bottom:12px; padding:12px; border-radius:16px; background:rgba(0,0,0,.72); color:white; font-size:14px; line-height:1.35; white-space:pre-wrap; }
    a-scene { z-index:1; }
  </style>
</head>

<body>
  <div id="startPanel">
    <h1>AR Microscope</h1>
    <p>Wersja diagnostyczna. Najpierw sprawdza pliki, potem uruchamia kamerę.</p>
    <button id="startButton">Uruchom AR</button>
    <button id="testFilesButton">Sprawdź pliki</button>
  </div>

  <div id="toolbar">
    <button id="rotateButton">360°</button>
    <button id="sectionButton">Przekrój</button>
    <button id="explodeButton">Eksploduj</button>
    <button id="resetButton">Reset</button>
  </div>

  <div id="status">Gotowe.</div>

  <a-scene
    id="scene"
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes; uiLoading: no;"
    color-space="sRGB"
    renderer="colorManagement: true; antialias: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded>

    <a-assets timeout="30000">
      <a-asset-item id="microscopeModel" src="./microscope.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-gltf-model
        id="microscope"
        src="#microscopeModel"
        position="0 0 0"
        rotation="0 0 0"
        scale="0.35 0.35 0.35">
      </a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    const sceneEl = document.getElementById("scene");
    const startPanel = document.getElementById("startPanel");
    const startButton = document.getElementById("startButton");
    const testFilesButton = document.getElementById("testFilesButton");
    const toolbar = document.getElementById("toolbar");
    const statusBox = document.getElementById("status");
    const target = document.getElementById("target");
    const microscope = document.getElementById("microscope");

    let rotationEnabled = false;
    let currentScale = 0.35;

    function setStatus(text) {
      statusBox.textContent = text;
      console.log(text);
    }

    async function checkFile(url) {
      try {
        const r = await fetch(url + "?v=" + Date.now(), { cache: "no-store" });
        if (!r.ok) return `${url}: BŁĄD ${r.status}`;
        const blob = await r.blob();
        return `${url}: OK, ${Math.round(blob.size / 1024)} kB`;
      } catch (e) {
        return `${url}: BŁĄD ${e.message}`;
      }
    }

    async function checkFiles() {
      setStatus("Sprawdzam pliki...");
      const results = [];
      results.push(await checkFile("./targets.mind"));
      results.push(await checkFile("./microscope.glb"));
      results.push(await checkFile("./microscope_reference_photo.png"));
      setStatus(results.join("\\n"));
    }

    testFilesButton.addEventListener("click", checkFiles);

    startButton.addEventListener("click", async () => {
      startPanel.style.display = "none";
      toolbar.style.display = "none";

      setStatus("1/3 Sprawdzam pliki...");
      const targets = await checkFile("./targets.mind");
      const model = await checkFile("./microscope.glb");

      setStatus(targets + "\\n" + model + "\\n\\n2/3 Uruchamiam MindAR...");

      const timeout = setTimeout(() => {
        setStatus(targets + "\\n" + model + "\\n\\nMindAR nadal się ładuje. Jeżeli stoi tu >30 s, problemem jest zwykle targets.mind albo zbyt ciężki model GLB.");
      }, 30000);

      try {
        const arSystem = sceneEl.systems["mindar-image-system"];
        await arSystem.start();
        clearTimeout(timeout);
        setStatus("3/3 Kamera działa. Skieruj telefon na zdjęcie mikroskopu.");
      } catch (e) {
        clearTimeout(timeout);
        startPanel.style.display = "block";
        setStatus("Błąd uruchomienia AR:\\n" + (e.name || "") + "\\n" + (e.message || e));
        console.error(e);
      }
    });

    target.addEventListener("targetFound", () => {
      toolbar.style.display = "block";
      setStatus("Wykryto zdjęcie mikroskopu. Model 3D jest aktywny.");
    });

    target.addEventListener("targetLost", () => {
      setStatus("Utracono śledzenie. Skieruj telefon ponownie na zdjęcie mikroskopu.");
    });

    document.getElementById("rotateButton").addEventListener("click", () => {
      rotationEnabled = !rotationEnabled;
      setStatus(rotationEnabled ? "Obrót 360° włączony." : "Obrót 360° wyłączony.");
    });

    document.getElementById("sectionButton").addEventListener("click", () => {
      microscope.setAttribute("material", "opacity: 0.55; transparent: true");
      setStatus("To tylko przezroczystość. Prawdziwy przekrój wymaga osobnego modelu microscope_section.glb.");
    });

    document.getElementById("explodeButton").addEventListener("click", () => {
      currentScale = currentScale * 1.25;
      microscope.setAttribute("scale", `${currentScale} ${currentScale} ${currentScale}`);
      setStatus("To tylko demonstracyjne powiększenie. Prawdziwy widok eksplodowany wymaga modelu microscope_exploded.glb.");
    });

    document.getElementById("resetButton").addEventListener("click", () => {
      rotationEnabled = false;
      currentScale = 0.35;
      microscope.setAttribute("rotation", "0 0 0");
      microscope.setAttribute("scale", `${currentScale} ${currentScale} ${currentScale}`);
      microscope.removeAttribute("material");
      setStatus("Reset modelu.");
    });

    function animate() {
      requestAnimationFrame(animate);
      if (rotationEnabled) {
        const rot = microscope.getAttribute("rotation");
        microscope.setAttribute("rotation", { x: rot.x, y: rot.y + 1.2, z: rot.z });
      }
    }
    animate();

    window.addEventListener("error", (event) => setStatus("Błąd JS:\\n" + event.message));
    window.addEventListener("unhandledrejection", (event) => setStatus("Błąd Promise:\\n" + event.reason));
  </script>
</body>
</html>
