<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>AR Product Viewer</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#070b10;color:#fff;font-family:Arial,sans-serif}
    #video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;background:#111;display:none}
    #startPanel{position:fixed;z-index:30;left:50%;top:50%;transform:translate(-50%,-50%);width:min(90vw,560px);padding:26px;border-radius:22px;background:rgba(19,25,36,.94);text-align:center;box-shadow:0 18px 70px rgba(0,0,0,.55)}
    h1{margin:0 0 16px;font-size:32px}
    p{font-size:18px;line-height:1.35}
    button{border:0;border-radius:14px;padding:14px 18px;font-size:16px;font-weight:700;background:white;color:#111;margin:5px;cursor:pointer}
    #error{margin-top:14px;color:#ffb4b4;font-size:15px;white-space:pre-wrap}
    #hud{display:none;position:fixed;z-index:25;left:14px;right:14px;bottom:14px;padding:13px;border-radius:16px;background:rgba(0,0,0,.58);backdrop-filter:blur(8px)}
    #status{font-size:15px;line-height:1.35}
    #targetFrame{display:none;position:fixed;z-index:20;left:50%;top:42%;transform:translate(-50%,-50%);width:78vw;height:46vw;max-width:560px;max-height:330px;border:3px dashed rgba(255,255,255,.9);border-radius:18px;box-sizing:border-box;pointer-events:none}
    #targetFrame:after{content:"Umieść zdjęcie w ramce";position:absolute;left:50%;bottom:-34px;transform:translateX(-50%);font-size:14px;background:rgba(0,0,0,.5);padding:6px 10px;border-radius:10px;white-space:nowrap}
    #model{display:none;position:fixed;z-index:18;left:50%;top:47%;width:210px;height:120px;transform:translate(-50%,-50%) rotate(0deg) scale(1);border-radius:23px;background:linear-gradient(135deg,#263242,#121923);border:4px solid rgba(255,255,255,.88);box-shadow:0 22px 70px rgba(0,0,0,.65);text-align:center;line-height:120px;font-weight:bold;font-size:22px;transition:.45s}
    #model.camera:before{content:"";position:absolute;right:-47px;top:29px;width:78px;height:58px;border-radius:50%;background:radial-gradient(circle,#1f2b38 0 33%,#8090a3 34% 47%,#111a25 48% 100%);border:4px solid rgba(255,255,255,.88)}
    #model.screwdriver{width:280px;height:38px;border-radius:19px;line-height:38px;background:linear-gradient(90deg,#bcc5d2 0 58%,#222 59% 78%,#f2c230 79% 100%);color:#111}
    #toolbar{display:none;position:fixed;z-index:26;left:10px;right:10px;top:calc(env(safe-area-inset-top) + 12px);text-align:center}
    #toolbar button{font-size:14px;padding:10px 12px}
  </style>
</head>
<body>
  <video id="video" playsinline autoplay muted></video>

  <div id="startPanel">
    <h1>AR Product Viewer</h1>
    <p>Kamera ma działać jak wcześniej. Po uruchomieniu skieruj telefon na zdjęcie kamery albo śrubokręta i wypełnij nim ramkę.</p>
    <button id="startBtn">Uruchom kamerę</button>
    <div id="error"></div>
  </div>

  <div id="targetFrame"></div>
  <div id="model" class="camera">MODEL 3D</div>

  <div id="toolbar">
    <button id="rotateBtn">360°</button>
    <button id="sectionBtn">Przekrój</button>
    <button id="explodeBtn">Eksploduj</button>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="hud"><div id="status">Gotowe.</div></div>

<script>
const video = document.getElementById("video");
const startPanel = document.getElementById("startPanel");
const startBtn = document.getElementById("startBtn");
const errorBox = document.getElementById("error");
const hud = document.getElementById("hud");
const statusBox = document.getElementById("status");
const frame = document.getElementById("targetFrame");
const model = document.getElementById("model");
const toolbar = document.getElementById("toolbar");

let refs = [];
let detected = null;
let rotationRunning = false;
let angle = 0;

function msg(t){ statusBox.textContent = t; }
function err(t){ errorBox.textContent = t; console.error(t); }

function loadImage(src, name){
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve({name, img, vector: imageVector(img)});
    img.onerror = () => resolve(null);
    img.src = src + "?v=" + Date.now();
  });
}

function imageVector(img){
  const c = document.createElement("canvas");
  c.width = 32; c.height = 32;
  const ctx = c.getContext("2d", {willReadFrequently:true});
  ctx.drawImage(img,0,0,32,32);
  const d = ctx.getImageData(0,0,32,32).data;
  const out = [];
  for(let i=0;i<d.length;i+=4){
    const gray = (d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114)/255;
    out.push(gray);
  }
  return out;
}

function cropVideoVector(){
  const vw = video.videoWidth, vh = video.videoHeight;
  if(!vw || !vh) return null;
  const sizeW = Math.floor(vw*0.72);
  const sizeH = Math.floor(vh*0.42);
  const sx = Math.floor((vw-sizeW)/2);
  const sy = Math.floor((vh-sizeH)*0.42);
  const c = document.createElement("canvas");
  c.width = 32; c.height = 32;
  const ctx = c.getContext("2d", {willReadFrequently:true});
  ctx.drawImage(video, sx, sy, sizeW, sizeH, 0, 0, 32, 32);
  const d = ctx.getImageData(0,0,32,32).data;
  const out = [];
  for(let i=0;i<d.length;i+=4){
    const gray = (d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114)/255;
    out.push(gray);
  }
  return out;
}

function mse(a,b){
  let s=0;
  for(let i=0;i<a.length;i++){
    const x=a[i]-b[i]; s += x*x;
  }
  return s/a.length;
}

async function startCamera(){
  errorBox.textContent = "";
  if(!window.isSecureContext){
    err("Strona musi działać przez HTTPS.");
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    err("Ta przeglądarka nie obsługuje getUserMedia. Użyj aktualnego Chrome/Safari.");
    return;
  }

  try {
    refs = (await Promise.all([
      loadImage("assets/reference/camera_reference.png", "camera"),
      loadImage("assets/reference/screwdriver_reference.png", "screwdriver")
    ])).filter(Boolean);

    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:"environment"}, width:{ideal:1280}, height:{ideal:720}},
      audio:false
    });

    video.srcObject = stream;
    video.style.display = "block";
    startPanel.style.display = "none";
    hud.style.display = "block";
    frame.style.display = "block";
    msg(refs.length === 2
      ? "Kamera działa. Umieść zdjęcie kamery albo śrubokręta w ramce."
      : "Kamera działa, ale nie wczytano obu obrazów referencyjnych. Sprawdź folder assets/reference.");
    scanLoop();

  } catch(e) {
    err("Nie udało się uruchomić kamery.\n" + (e.name || "") + "\n" + (e.message || ""));
  }
}

function scanLoop(){
  const v = cropVideoVector();
  if(v && refs.length){
    let best = {name:null, score:999};
    for(const r of refs){
      const score = mse(v, r.vector);
      if(score < best.score) best = {name:r.name, score};
    }

    // Threshold is intentionally loose: this is simple browser-side detection, not full MindAR.
    if(best.score < 0.075){
      showDetected(best.name, best.score);
    } else if(!detected) {
      msg("Skanuję... wypełnij ramkę zdjęciem kamery albo śrubokręta. Wynik: " + best.score.toFixed(3));
    }
  }
  requestAnimationFrame(scanLoop);
}

function showDetected(name, score){
  if(detected === name) return;
  detected = name;
  model.className = name === "camera" ? "camera" : "screwdriver";
  model.textContent = name === "camera" ? "KAMERA 3D" : "ŚRUBOKRĘT 3D";
  model.style.display = "block";
  toolbar.style.display = "block";
  frame.style.display = "none";
  msg("Wykryto: " + (name === "camera" ? "kamera" : "śrubokręt") + ". Przyciski AR są aktywne.");
}

function animate(){
  if(rotationRunning){
    angle = (angle + 1.2) % 360;
    model.style.transform = "translate(-50%,-50%) rotate(" + angle + "deg) scale(1)";
  }
  requestAnimationFrame(animate);
}
animate();

document.getElementById("rotateBtn").onclick = () => { rotationRunning = !rotationRunning; };
document.getElementById("sectionBtn").onclick = () => {
  rotationRunning = false;
  model.style.opacity = "0.55";
  msg("Tryb przekroju: demonstracja. Prawdziwy przekrój wymaga osobnego modelu 3D.");
};
document.getElementById("explodeBtn").onclick = () => {
  rotationRunning = false;
  model.style.transform = "translate(-50%,-50%) rotate(0deg) scale(1.35)";
  msg("Widok eksplodowany: demonstracja. Prawdziwe rozłożenie wymaga modelu podzielonego na części.");
};
document.getElementById("resetBtn").onclick = () => {
  rotationRunning = false;
  detected = null;
  angle = 0;
  model.style.display = "none";
  toolbar.style.display = "none";
  model.style.opacity = "1";
  model.style.transform = "translate(-50%,-50%) rotate(0deg) scale(1)";
  frame.style.display = "block";
  msg("Zresetowano. Umieść zdjęcie w ramce.");
};

startBtn.addEventListener("click", startCamera);
</script>
</body>
</html>
