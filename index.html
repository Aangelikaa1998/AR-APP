<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>AR Product Viewer — Microscope</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#070b10;color:#fff;font-family:Arial,sans-serif}
    #video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;background:#111;display:none}
    #startPanel{position:fixed;z-index:30;left:50%;top:50%;transform:translate(-50%,-50%);width:min(90vw,560px);padding:26px;border-radius:22px;background:rgba(19,25,36,.94);text-align:center;box-shadow:0 18px 70px rgba(0,0,0,.55)}
    h1{margin:0 0 16px;font-size:30px}
    p{font-size:18px;line-height:1.35}
    button{border:0;border-radius:14px;padding:14px 18px;font-size:16px;font-weight:700;background:white;color:#111;margin:5px;cursor:pointer}
    #error{margin-top:14px;color:#ffb4b4;font-size:15px;white-space:pre-wrap}
    #hud{display:none;position:fixed;z-index:25;left:14px;right:14px;bottom:14px;padding:13px;border-radius:16px;background:rgba(0,0,0,.62);backdrop-filter:blur(8px)}
    #status{font-size:15px;line-height:1.35}
    #targetFrame{display:none;position:fixed;z-index:20;left:50%;top:42%;transform:translate(-50%,-50%);width:78vw;height:46vw;max-width:560px;max-height:330px;border:3px dashed rgba(255,255,255,.95);border-radius:18px;box-sizing:border-box;pointer-events:none}
    #targetFrame:after{content:"Ustaw TO zdjęcie mikroskopu w ramce i kliknij SKANUJ";position:absolute;left:50%;bottom:-38px;transform:translateX(-50%);font-size:13px;background:rgba(0,0,0,.65);padding:7px 10px;border-radius:10px;white-space:nowrap}
    #toolbar{display:none;position:fixed;z-index:30;left:8px;right:8px;top:calc(env(safe-area-inset-top) + 12px);text-align:center}
    #toolbar button{font-size:14px;padding:10px 11px}
    #scanbar{display:none;position:fixed;z-index:30;left:10px;right:10px;top:calc(env(safe-area-inset-top) + 12px);text-align:center}
    #scanBtn{background:#fff;color:#111;font-size:18px;padding:13px 22px}
    #viewer3d{display:none;position:fixed;z-index:18;left:50%;top:49%;width:86vw;height:50vh;max-width:680px;max-height:480px;transform:translate(-50%,-50%);pointer-events:none}
    #viewer3d canvas{width:100%;height:100%;display:block}
  </style>
</head>
<body>
  <video id="video" playsinline autoplay muted></video>

  <div id="startPanel">
    <h1>AR Product Viewer</h1>
    <p>Uruchom kamerę, ustaw przesłane zdjęcie mikroskopu w ramce i kliknij <b>Skanuj zdjęcie</b>.</p>
    <button id="startBtn">Uruchom kamerę</button>
    <div id="error"></div>
  </div>

  <div id="targetFrame"></div>

  <div id="scanbar">
    <button id="scanBtn">Skanuj zdjęcie</button>
  </div>

  <div id="toolbar">
    <button id="rotateBtn">360°</button>
    <button id="sectionBtn">Przekrój</button>
    <button id="explodeBtn">Eksploduj</button>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="viewer3d"></div>
  <div id="hud"><div id="status">Gotowe.</div></div>

const video = document.getElementById("video");
const startPanel = document.getElementById("startPanel");
const startBtn = document.getElementById("startBtn");
const errorBox = document.getElementById("error");
const hud = document.getElementById("hud");
const statusBox = document.getElementById("status");
const frame = document.getElementById("targetFrame");
const toolbar = document.getElementById("toolbar");
const scanbar = document.getElementById("scanbar");
const scanBtn = document.getElementById("scanBtn");
const viewer3d = document.getElementById("viewer3d");

let refVector = null;
let detected = false;
let rotationRunning = false;
let scene, camera3d, renderer, microscopeObject;

function msg(t){ statusBox.textContent = t; }
function err(t){ errorBox.textContent = t; console.error(t); }

function loadImage(src){
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(imageVector(img));
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

function imageVectorFromCanvasSource(drawFn){
  const c = document.createElement("canvas");
  c.width = 64; c.height = 64;
  const ctx = c.getContext("2d", {willReadFrequently:true});
  drawFn(ctx, c);
  const d = ctx.getImageData(0,0,c.width,c.height).data;
  const out = [];
  for(let i=0;i<d.length;i+=4){
    const gray = (d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114)/255;
    out.push(gray);
  }
  return out;
}

function imageVector(img){
  return imageVectorFromCanvasSource((ctx,c)=>ctx.drawImage(img,0,0,c.width,c.height));
}

function cropVideoVector(){
  const vw = video.videoWidth, vh = video.videoHeight;
  if(!vw || !vh) return null;
  const cropW = Math.floor(vw*0.72);
  const cropH = Math.floor(vh*0.52);
  const sx = Math.floor((vw-cropW)/2);
  const sy = Math.floor((vh-cropH)*0.42);
  return imageVectorFromCanvasSource((ctx,c)=>ctx.drawImage(video, sx, sy, cropW, cropH, 0, 0, c.width, c.height));
}

function mse(a,b){
  let s=0;
  for(let i=0;i<a.length;i++){
    const x=a[i]-b[i];
    s += x*x;
  }
  return s/a.length;
}

async function startCamera(){
  errorBox.textContent = "";

  if(!window.isSecureContext){
    err("Strona musi działać przez HTTPS.");
    return;
  }

  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    err("Ta przeglądarka nie obsługuje kamery. Użyj aktualnego Chrome/Safari.");
    return;
  }

  try {
    refVector = await loadImage(MICROSCOPE_REF);

    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:"environment"}, width:{ideal:1280}, height:{ideal:720}},
      audio:false
    });

    video.srcObject = stream;
    video.style.display = "block";
    startPanel.style.display = "none";
    hud.style.display = "block";
    frame.style.display = "block";
    scanbar.style.display = "block";
    msg("Kamera działa. Ustaw zdjęcie mikroskopu w ramce i kliknij: Skanuj zdjęcie.");

  } catch(e) {
    err("Nie udało się uruchomić kamery.\n" + (e.name || "") + "\n" + (e.message || ""));
  }
}

function scanNow(){
  if(!refVector){
    msg("Nie wczytano obrazu referencyjnego mikroskopu.");
    return;
  }

  const v = cropVideoVector();
  if(!v){
    msg("Brak obrazu z kamery. Spróbuj ponownie.");
    return;
  }

  const score = mse(v, refVector);

  if(score < 0.045){
    showDetected(score);
  } else {
    msg("Nie wykryto mikroskopu. Ustaw dokładnie to zdjęcie większe w ramce i kliknij ponownie. Wynik: " + score.toFixed(3));
  }
}

function initThreeIfNeeded(){
  if(renderer) return;

  scene = new THREE.Scene();
  camera3d = new THREE.PerspectiveCamera(35, viewer3d.clientWidth / viewer3d.clientHeight, 0.01, 1000);
  camera3d.position.set(0, 0.25, 4.5);

  renderer = new THREE.WebGLRenderer({ alpha:true, antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(viewer3d.clientWidth, viewer3d.clientHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  viewer3d.appendChild(renderer.domElement);

  scene.add(new THREE.HemisphereLight(0xffffff, 0x333333, 2.4));
  const dir = new THREE.DirectionalLight(0xffffff, 2.2);
  dir.position.set(3, 4, 4);
  scene.add(dir);

  const loader = new GLTFLoader();
  loader.load(
    "./microscope.glb",
    (gltf) => {
      microscopeObject = gltf.scene;
      const box = new THREE.Box3().setFromObject(microscopeObject);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);
      microscopeObject.position.sub(center);
      const maxDim = Math.max(size.x, size.y, size.z);
      if(maxDim > 0) microscopeObject.scale.setScalar(2.4 / maxDim);
      microscopeObject.rotation.set(0.15, -0.5, 0);
      scene.add(microscopeObject);
      msg("Wczytano model 3D mikroskopu.");
    },
    undefined,
    (e) => {
      msg("Nie udało się wczytać modelu microscope.glb. Sprawdź, czy plik jest w repozytorium.");
      console.error(e);
    }
  );

  animate3d();
}

function animate3d(){
  requestAnimationFrame(animate3d);
  if(microscopeObject && detected && rotationRunning){
    microscopeObject.rotation.y += 0.025;
  }
  if(renderer) renderer.render(scene, camera3d);
}

function showDetected(score){
  detected = true;
  toolbar.style.display = "block";
  scanbar.style.display = "none";
  frame.style.display = "none";
  viewer3d.style.display = "block";
  initThreeIfNeeded();
  msg("Wykryto mikroskop. Wynik: " + score.toFixed(3) + ". Przyciski są aktywne.");
}

document.getElementById("rotateBtn").onclick = () => { rotationRunning = !rotationRunning; };
document.getElementById("sectionBtn").onclick = () => {
  rotationRunning = false;
  if(microscopeObject){
    microscopeObject.traverse((obj) => {
      if(obj.isMesh && obj.material){
        if(Array.isArray(obj.material)){
          obj.material.forEach(m => { m.transparent = true; m.opacity = 0.48; });
        } else {
          obj.material.transparent = true;
          obj.material.opacity = 0.48;
        }
      }
    });
  }
  msg("Tryb przekroju: demonstracja. Prawdziwy przekrój wymaga osobnego modelu 3D z przekrojem.");
};
document.getElementById("explodeBtn").onclick = () => {
  rotationRunning = false;
  if(microscopeObject) microscopeObject.scale.multiplyScalar(1.25);
  msg("Widok eksplodowany: demonstracja. Prawdziwe rozłożenie wymaga modelu podzielonego na części.");
};
document.getElementById("resetBtn").onclick = () => {
  rotationRunning = false;
  detected = false;
  viewer3d.style.display = "none";
  toolbar.style.display = "none";
  frame.style.display = "block";
  scanbar.style.display = "block";
  if(microscopeObject){
    microscopeObject.traverse((obj) => {
      if(obj.isMesh && obj.material){
        if(Array.isArray(obj.material)){
          obj.material.forEach(m => { m.transparent = false; m.opacity = 1; });
        } else {
          obj.material.transparent = false;
          obj.material.opacity = 1;
        }
      }
    });
  }
  msg("Zresetowano. Ustaw zdjęcie mikroskopu w ramce i kliknij Skanuj zdjęcie.");
};

window.addEventListener("resize", () => {
  if(renderer && camera3d){
    camera3d.aspect = viewer3d.clientWidth / viewer3d.clientHeight;
    camera3d.updateProjectionMatrix();
    renderer.setSize(viewer3d.clientWidth, viewer3d.clientHeight);
  }
});

startBtn.addEventListener("click", startCamera);
scanBtn.addEventListener("click", scanNow);
</script>
</body>
</html>
